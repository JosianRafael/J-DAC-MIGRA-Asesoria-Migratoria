<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificar Certificado - JADAC MIGRA</title>
  <link rel="icon" type="image/jpeg" href="img/CarolLogo.jpeg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #fafcff;
      color: #0b1e33;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .verification-container {
      max-width: 600px;
      width: 100%;
      background: white;
      border-radius: 32px;
      padding: 50px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      border: 1px solid #eef3f9;
      text-align: center;
    }

    .verification-container .logo {
      width: 80px;
      height: 80px;
      background: #0b1e33;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: #c9a96e;
      font-size: 2rem;
      font-weight: 800;
    }

    .verification-container h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #0b1e33;
      margin-bottom: 8px;
    }

    .verification-container .subtitle {
      color: #6a7f94;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .verification-container .status-icon {
      font-size: 4rem;
      margin: 20px 0;
    }

    .verification-container .status-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .verification-container .status-title.valid {
      color: #28a745;
    }

    .verification-container .status-title.invalid {
      color: #dc3545;
    }

    .verification-container .status-title.revoked {
      color: #dc3545;
    }

    .verification-container .status-detail {
      color: #3e5a75;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .certificate-info {
      background: #f5f9ff;
      border-radius: 16px;
      padding: 20px;
      margin: 16px 0;
      text-align: left;
      border: 1px solid #eef3f9;
    }

    .certificate-info .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #eef3f9;
      font-size: 0.9rem;
    }

    .certificate-info .info-row:last-child {
      border-bottom: none;
    }

    .certificate-info .info-row strong {
      color: #0b2b4a;
    }

    .certificate-info .info-row span {
      color: #3e5a75;
      text-align: right;
    }

    .btn {
      display: inline-block;
      padding: 14px 38px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.25s ease;
      border: none;
      cursor: pointer;
      background: #0b2b4a;
      color: white;
      box-shadow: 0 8px 20px rgba(11, 43, 74, 0.08);
      text-align: center;
      margin-top: 16px;
    }

    .btn:hover {
      background: #1a3f61;
      transform: translateY(-4px);
      box-shadow: 0 16px 30px rgba(11, 43, 74, 0.18);
    }

    .btn-gold {
      background: #c9a96e;
      color: #0b1e33;
    }

    .btn-gold:hover {
      background: #b89554;
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(201, 169, 110, 0.3);
    }

    .btn-success {
      background: #28a745;
      color: white;
    }

    .btn-success:hover {
      background: #218838;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-danger:hover {
      background: #c82333;
      transform: translateY(-2px);
    }

    .loading-spinner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 0;
    }

    .loading-spinner i {
      font-size: 2.5rem;
      color: #c9a96e;
      animation: spin 1s linear infinite;
    }

    .loading-spinner p {
      margin-top: 12px;
      color: #6a7f94;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .badge-status {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge-valid {
      background: #d4edda;
      color: #155724;
    }

    .badge-revoked {
      background: #f8d7da;
      color: #721c24;
    }

    .badge-invalid {
      background: #f8d7da;
      color: #721c24;
    }

    .footer {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eef3f9;
      font-size: 0.8rem;
      color: #6a7f94;
    }

    .footer a {
      color: #c9a96e;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .verification-container {
        padding: 30px 20px;
        border-radius: 24px;
      }

      .verification-container h1 {
        font-size: 1.4rem;
      }

      .certificate-info .info-row {
        flex-direction: column;
        gap: 2px;
      }

      .certificate-info .info-row span {
        text-align: left;
      }
    }
  </style>
</head>
<body>

  <div class="verification-container" id="verificationContainer">
    <!-- Logo -->
    <div class="logo">JM</div>
    
    <!-- Título -->
    <h1>Verificación de Certificado</h1>
    <p class="subtitle">JADAC MIGRA · Asesoría y Trámites Migratorios</p>

    <!-- Contenido de verificación -->
    <div id="verificationContent">
      <!-- Loading inicial -->
      <div class="loading-spinner" id="loadingSpinner">
        <i class="fas fa-spinner"></i>
        <p>Verificando certificado...</p>
      </div>

      <!-- Resultado de verificación (oculto inicialmente) -->
      <div id="verificationResult" style="display:none;"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <i class="fas fa-shield-alt" style="color:#c9a96e;"></i>
      <span>Verificación segura · </span>
      <a href="index.html">Volver al inicio</a>
    </div>
  </div>

  <!-- ============================================================
  CONFIGURACIÓN DE SUPABASE
  ============================================================ -->
  <script>
    const supabaseUrl = 'https://vnkzwqocoihzndrtkgtl.supabase.co';
    const supabaseKey = 'sb_publishable__Dkw6e-XMWd96Ya9ykF1fg_rD-uXNjz';
    const SUPABASE = supabase.createClient(supabaseUrl, supabaseKey);
  </script>

  <!-- ============================================================
  LÓGICA DE VERIFICACIÓN
  ============================================================ -->
  <script>
    // ============================================================
    // OBTENER CÓDIGO DE LA URL
    // ============================================================

    function getCertificateCode() {
      // Obtener la ruta completa de la URL
      const path = window.location.pathname;
      
      // Buscar el código en la URL (formato: /verificar/JADAC-2026-000145)
      const match = path.match(/\/verificar\/(.+)$/);
      
      if (match && match[1]) {
        return decodeURIComponent(match[1]);
      }
      
      // También buscar en los parámetros de consulta (?code=JADAC-2026-000145)
      const urlParams = new URLSearchParams(window.location.search);
      const codeParam = urlParams.get('code');
      
      if (codeParam) {
        return decodeURIComponent(codeParam);
      }
      
      return null;
    }

    // ============================================================
    // VERIFICAR CERTIFICADO
    // ============================================================

    async function verifyCertificate(code) {
      const loadingSpinner = document.getElementById('loadingSpinner');
      const resultDiv = document.getElementById('verificationResult');

      try {
        // Buscar el certificado en la base de datos
        const { data: certificate, error } = await SUPABASE
          .from('certificates')
          .select('*')
          .eq('code', code)
          .maybeSingle();

        if (error) {
          console.error('Error al buscar certificado:', error);
          showError('Error al verificar el certificado. Por favor, intenta nuevamente.');
          return;
        }

        if (!certificate) {
          showInvalid();
          return;
        }

        // Verificar el estado del certificado
        if (certificate.status === 'revoked') {
          showRevoked(certificate);
          return;
        }

        if (certificate.status === 'valid') {
          // Obtener datos adicionales (inscripción y curso)
          const [inscriptionRes, courseRes] = await Promise.all([
            SUPABASE.from('inscriptions').select('*').eq('id', certificate.inscription_id).single(),
            SUPABASE.from('products').select('*').eq('id', certificate.course_id).single()
          ]);

          const inscription = inscriptionRes.data;
          const course = courseRes.data;

          showValid(certificate, inscription, course);
          return;
        }

        // Estado desconocido
        showError('Estado del certificado desconocido.');

      } catch (err) {
        console.error('Error en verifyCertificate:', err);
        showError('Ocurrió un error al verificar el certificado.');
      }
    }

    // ============================================================
    // FUNCIONES DE RENDERIZADO
    // ============================================================

    function showValid(certificate, inscription, course) {
      const loadingSpinner = document.getElementById('loadingSpinner');
      const resultDiv = document.getElementById('verificationResult');

      loadingSpinner.style.display = 'none';
      resultDiv.style.display = 'block';

      const formattedDate = formatDate(certificate.generated_at);

      resultDiv.innerHTML = `
        <div class="status-icon">✅</div>
        <div class="status-title valid">¡Certificado Válido!</div>
        <div class="status-detail">
          Este certificado ha sido verificado y es auténtico.
        </div>

        <div class="certificate-info">
          <div class="info-row">
            <strong>Código</strong>
            <span>${certificate.code}</span>
          </div>
          <div class="info-row">
            <strong>Estudiante</strong>
            <span>${inscription?.name || 'No disponible'}</span>
          </div>
          <div class="info-row">
            <strong>Curso</strong>
            <span>${course?.name || 'No disponible'}</span>
          </div>
          <div class="info-row">
            <strong>Fecha de emisión</strong>
            <span>${formattedDate}</span>
          </div>
          <div class="info-row">
            <strong>Modalidad</strong>
            <span>${course?.modality || 'No especificada'}</span>
          </div>
          <div class="info-row">
            <strong>Facilitadora</strong>
            <span>Lic. Carolin Lorenzo Lorenzo</span>
          </div>
          <div class="info-row">
            <strong>Estado</strong>
            <span><span class="badge-status badge-valid">✅ Válido</span></span>
          </div>
          <div class="info-row">
            <strong>Empresa emisora</strong>
            <span>JADAC MIGRA</span>
          </div>
        </div>

        <button class="btn btn-success" onclick="window.location.href='index.html'">
          <i class="fas fa-home"></i> Volver al inicio
        </button>
      `;
    }

    function showRevoked(certificate) {
      const loadingSpinner = document.getElementById('loadingSpinner');
      const resultDiv = document.getElementById('verificationResult');

      loadingSpinner.style.display = 'none';
      resultDiv.style.display = 'block';

      resultDiv.innerHTML = `
        <div class="status-icon">❌</div>
        <div class="status-title revoked">Certificado Revocado</div>
        <div class="status-detail">
          Este certificado ha sido revocado por el administrador y ya no es válido.
        </div>

        <div class="certificate-info">
          <div class="info-row">
            <strong>Código</strong>
            <span>${certificate.code}</span>
          </div>
          <div class="info-row">
            <strong>Estado</strong>
            <span><span class="badge-status badge-revoked">❌ Revocado</span></span>
          </div>
          <div class="info-row">
            <strong>Fecha de emisión</strong>
            <span>${formatDate(certificate.generated_at)}</span>
          </div>
          <div class="info-row">
            <strong>Empresa emisora</strong>
            <span>JADAC MIGRA</span>
          </div>
        </div>

        <p style="color:#6a7f94; font-size:0.9rem; margin-top:12px;">
          Si crees que esto es un error, contacta con el administrador.
        </p>

        <button class="btn btn-danger" onclick="window.location.href='index.html'">
          <i class="fas fa-home"></i> Volver al inicio
        </button>
      `;
    }

    function showInvalid() {
      const loadingSpinner = document.getElementById('loadingSpinner');
      const resultDiv = document.getElementById('verificationResult');

      loadingSpinner.style.display = 'none';
      resultDiv.style.display = 'block';

      resultDiv.innerHTML = `
        <div class="status-icon">❌</div>
        <div class="status-title invalid">Certificado No Válido</div>
        <div class="status-detail">
          El código proporcionado no corresponde a ningún certificado válido en nuestro sistema.
        </div>

        <div style="background:#f8d7da; border-radius:16px; padding:20px; margin:16px 0; border:1px solid #f5c6cb; text-align:left;">
          <p style="color:#721c24; font-weight:600; margin-bottom:4px;">
            <i class="fas fa-exclamation-triangle"></i> Posibles razones:
          </p>
          <ul style="color:#721c24; font-size:0.9rem; margin-left:20px;">
            <li>El código fue escrito incorrectamente</li>
            <li>El certificado no existe en nuestro sistema</li>
            <li>El certificado fue eliminado</li>
          </ul>
        </div>

        <p style="color:#6a7f94; font-size:0.9rem; margin-top:12px;">
          Si crees que esto es un error, contacta con el administrador.
        </p>

        <button class="btn btn-danger" onclick="window.location.href='index.html'">
          <i class="fas fa-home"></i> Volver al inicio
        </button>
      `;
    }

    function showError(message) {
      const loadingSpinner = document.getElementById('loadingSpinner');
      const resultDiv = document.getElementById('verificationResult');

      loadingSpinner.style.display = 'none';
      resultDiv.style.display = 'block';

      resultDiv.innerHTML = `
        <div class="status-icon">⚠️</div>
        <div class="status-title invalid">Error de Verificación</div>
        <div class="status-detail">${message}</div>

        <button class="btn btn-gold" onclick="window.location.href='index.html'">
          <i class="fas fa-home"></i> Volver al inicio
        </button>
      `;
    }

    // ============================================================
    // FUNCIONES AUXILIARES
    // ============================================================

    function formatDate(dateStr) {
      if (!dateStr) return 'No especificada';
      const date = new Date(dateStr);
      return date.toLocaleDateString('es-ES', {
        day: 'numeric',
        month: 'long',
        year: 'numeric'
      });
    }

    // ============================================================
    // INICIALIZAR VERIFICACIÓN
    // ============================================================

    document.addEventListener('DOMContentLoaded', function() {
      const code = getCertificateCode();

      if (!code) {
        // No hay código en la URL
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultDiv = document.getElementById('verificationResult');
        
        loadingSpinner.style.display = 'none';
        resultDiv.style.display = 'block';
        
        resultDiv.innerHTML = `
          <div class="status-icon">ℹ️</div>
          <div class="status-title" style="color:#6a7f94;">No se encontró certificado</div>
          <div class="status-detail">
            No se proporcionó un código de certificado para verificar.
            <br><br>
            Asegúrate de usar el enlace completo que aparece en el código QR de tu certificado.
          </div>
          <button class="btn btn-gold" onclick="window.location.href='index.html'">
            <i class="fas fa-home"></i> Volver al inicio
          </button>
        `;
        return;
      }

      // Verificar el certificado
      verifyCertificate(code);
    });
  </script>

</body>
</html>
